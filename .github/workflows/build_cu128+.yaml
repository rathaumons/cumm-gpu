name: build cu128+

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ['3.11', '3.12', '3.13', '3.14'] 
        cuda-version: ['12.8', '13.0', '']
    steps:
      - uses: actions/checkout@v6
      - name: Install CUDA
        env:
          CUDA_VERSION: ${{ matrix.cuda-version }}
          PYTHON_VERSION: ${{ matrix.python-version }}
          cuda: ${{ matrix.cuda-version }}
        if: |
          (env.CUDA_VERSION != '') && (
            (github.event_name == 'push' && (startsWith(github.ref, 'refs/tags')) ) || 
            (
              (env.PYTHON_VERSION == '3.14')
            )
          )
        shell: powershell
        run: .\tools\install_windows_cuda.ps1
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
      - uses: ilammy/msvc-dev-cmd@v1
      - name: Install pep build
        run: |
          python -m pip install build --user
          python -m pip install --upgrade pip twine wheel
          python -m pip install pytest setuptools
      - name: Build a windows binary wheel
        env:
          CUDA_VERSION: ${{ matrix.cuda-version }}
          PYTHON_VERSION: ${{ matrix.python-version }}
          CUMM_CUDA_VERSION: ${{ matrix.cuda-version }}
        if: |
          (
            (github.event_name == 'push' && (startsWith(github.ref, 'refs/tags')) ) || 
            (
              (env.PYTHON_VERSION == '3.14')
            )
          )
        run: |
          # clone nvidia cuda cccl to cumm/third_party/cccl
          # ctk-cccl mapping: https://github.com/NVIDIA/cccl#mapping-to-ctk-versions
          if ($env:CUDA_VERSION -ne '') {
            if ($env:CUDA_VERSION -eq "12.8") {
              $CCCL_MINOR_VERSION = "7"
              $CCCL_BRANCH_NAME = "2.$CCCL_MINOR_VERSION.0"
            } else {
              $CCCL_MINOR_VERSION = "0"
              $CCCL_BRANCH_NAME = "3.$CCCL_MINOR_VERSION.3"
            }
            git clone https://github.com/NVIDIA/cccl.git third_party/cccl -b v$CCCL_BRANCH_NAME
          }
          # if we use $env to set a var with empty string, this env will be deteted. f**k windows x2 !
          $env:CUMM_CUDA_ARCH_LIST = "all"
          $env:CUMM_DISABLE_JIT = "1"
          pip install pccm pybind11
          python -m build --wheel --outdir dist/ .
        shell: powershell
      - name: Archive wheel
        uses: actions/upload-artifact@v6
        with:
          name: windows-wheels-${{ matrix.python-version }}-${{ matrix.cuda-version }}
          path: dist/*.whl
  
  build-linux:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ['3.11']  # uploader
        cuda-version: ['128', '']
    steps:
      - name: Free disk space
        run: |
          sudo rm -rf /usr/local/lib/android
          sudo rm -rf /opt/ghc
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /usr/local/share/powershell
          sudo rm -rf /usr/local/share/chromium
          docker system prune -af
      - uses: actions/checkout@v6
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install pep build
        run: |
          python -m pip install build --user
          python -m pip install --upgrade pip twine wheel
          python -m pip install pytest setuptools
      - name: Build a cuda wheel
        env:
          CUDA_VERSION: ${{ matrix.cuda-version }}
          PYTHON_VERSION: ${{ matrix.python-version }}
          DOCKER_IMAGE: scrin/manylinux2014-cuda:cu${{ matrix.cuda-version }}-devel-1.0.0
          PLAT: ${{ matrix.cuda-version == '128' && 'manylinux_2_24_x86_64' || 'manylinux2014_x86_64' }}
        if: (github.event_name == 'push' && (startsWith(github.ref, 'refs/tags')) && (env.CUDA_VERSION != '') ) || env.CUDA_VERSION == '128'
        run: |
          # clone nvidia cuda cccl to cumm/third_party/cccl
          # ctk-cccl mapping: https://github.com/NVIDIA/cccl#mapping-to-ctk-versions
          if [ -n "$CUDA_VERSION" ]; then
            CCCL_MINOR_VERSION="7"
            CCCL_BRANCH_NAME="2.$CCCL_MINOR_VERSION.0"
            git clone https://github.com/NVIDIA/cccl.git third_party/cccl -b v$CCCL_BRANCH_NAME
          fi
          docker run --rm \
            -e PLAT="$PLAT" \
            -e CUMM_CUDA_VERSION="${{ matrix.cuda-version }}" \
            -v "$(pwd)":/io \
            $DOCKER_IMAGE \
            bash -c "source /etc/bashrc && /io/tools/build-wheels.sh"
          # python -m pip install myclang -f ./dist
          # pytest ./test
      - name: Build a cpu wheel
        env:
          CUDA_VERSION: ${{ matrix.cuda-version }}
          PYTHON_VERSION: ${{ matrix.python-version }}
          DOCKER_IMAGE: scrin/manylinux2014-cuda:cu121-devel-1.0.0
          PLAT: manylinux2014_x86_64
        if: (github.event_name == 'push' && (startsWith(github.ref, 'refs/tags')) && (env.CUDA_VERSION == '') )
        run: |
          docker run --rm \
            -v "$(pwd)":/io \
            -e PLAT="$PLAT" \
            -e CUMM_CUDA_VERSION="${{ matrix.cuda-version }}" \
            $DOCKER_IMAGE \
            bash -c "source /etc/bashrc && /io/tools/build-wheels.sh"
      - name: Archive wheels
        uses: actions/upload-artifact@v6
        with:
          name: linux-wheels-${{ matrix.python-version }}-${{ matrix.cuda-version }}
          path: dist/*.whl

  build-linux-cu130:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
    steps:
      - name: Free disk space
        run: |
          sudo rm -rf /usr/local/lib/android
          sudo rm -rf /opt/ghc
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /usr/local/share/powershell
          sudo rm -rf /usr/local/share/chromium
          docker system prune -af
      - uses: actions/checkout@v6
      - name: Build manylinux_2_28 + CUDA 13.0 image
        run: docker build -t manylinux_2_28-cu130 -f .github/docker/Dockerfile.manylinux_2_28_cu130 .
      - name: Build wheels with CCCL v3.0
        run: |
          # ctk-cccl mapping: https://github.com/NVIDIA/cccl#mapping-to-ctk-versions
          docker run --rm \
            -v "$(pwd)":/io \
            -e PLAT=manylinux_2_24_x86_64 \
            -e CUMM_CUDA_VERSION=130 \
            -e CUMM_DISABLE_JIT=1 \
            manylinux_2_28-cu130 \
            bash -c "
              cd /io
              git clone https://github.com/NVIDIA/cccl.git third_party/cccl -b v3.0.3
              /io/tools/build-wheels.sh
            "
      - name: Archive wheels
        uses: actions/upload-artifact@v6
        with:
          name: linux-wheels-cu130
          path: dist/*.whl

  build-macos:
    runs-on: macos-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ['3.11', '3.12', '3.13', '3.14'] 
    steps:
      - uses: actions/checkout@v6
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install pep build
        run: |
          python -m pip install build --user
          python -m pip install --upgrade pip twine wheel
          python -m pip install pytest setuptools
      - name: Build a Mac OS binary wheel
        env:
          PYTHON_VERSION: ${{ matrix.python-version }}
        if: |
          (
            (github.event_name == 'push' && (startsWith(github.ref, 'refs/tags')) ) || 
            (
              (env.PYTHON_VERSION == '3.14')
            )
          )
        run: |
          export CUMM_DISABLE_JIT="1"
          git clone https://github.com/bkaradzic/metal-cpp.git
          export CUMM_APPLE_METAL_CPP_ROOT=$PWD/metal-cpp
          pip install pccm pybind11
          python -m build --wheel --outdir dist/ .
      - name: Archive wheels
        uses: actions/upload-artifact@v6
        with:
          name: macos-wheels-${{ matrix.python-version }}
          path: dist/*.whl
